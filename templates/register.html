<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ElCare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-wrapper { max-width: 440px; margin: 60px auto; padding: 0 20px; }
        .auth-card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
        .auth-card h2 { text-align: center; margin-bottom: 8px; font-size: 1.7rem; }
        .auth-card .subtitle { text-align: center; color: #888; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: border 0.2s; }
        .form-group input:focus { border-color: #4e73df; outline: none; }
        .btn-full { width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; border: none; background: #4e73df; color: #fff; cursor: pointer; font-weight: 600; margin-top: 6px; transition: background 0.2s; }
        .btn-full:hover { background: #3a57b5; }
        .auth-link { text-align: center; margin-top: 18px; color: #666; }
        .auth-link a { color: #4e73df; text-decoration: none; font-weight: 500; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.95rem; }
        .alert-error { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #e8f8f0; color: #27ae60; }
        .brand { text-align: center; margin-bottom: 24px; font-size: 1.1rem; color: #4e73df; font-weight: 700; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="brand"><i class="fas fa-heartbeat"></i> ElCare</div>
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join ElCare to track your health</p>

        <div id="alertBox" style="display:none;" class="alert"></div>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" id="username" placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Repeat password">
        </div>
        <button class="btn-full" onclick="doRegister()">
            <i class="fas fa-user-plus"></i> Create Account
        </button>
        <p class="auth-link">Already have an account? <a href="/login">Log in</a></p>
    </div>
</div>
<script>
async function doRegister() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;

    if (!username || !email || !password || !confirm) { showAlert('All fields are required.', 'error'); return; }
    if (password !== confirm) { showAlert('Passwords do not match.', 'error'); return; }
    if (password.length < 6) { showAlert('Password must be at least 6 characters.', 'error'); return; }

    const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (data.success) {
        showAlert('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = data.redirect || '/', 800);
    } else {
        showAlert(data.message, 'error');
    }
}
function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = `alert alert-${type}`;
    box.style.display = 'block';
}
</script>
</body>
</html>
